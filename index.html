<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tic-tac-toe</title>
    <link href="style.css" rel="stylesheet" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="stats">
        <div>
          <p>Player 1 score:</p>
          <p class="player1-score">0</p>
        </div>
        <div>
          <p>Player 2 score:</p>
          <p class="player2-score">0</p>
        </div>
        <div>
          <p>Current Player:</p>
          <p class="current-player">Player 1</p>
        </div>
      </div>
      <div class="grid">
        <div class="grid-spot" data-index="0"></div>
        <div class="grid-spot" data-index="1"></div>
        <div class="grid-spot" data-index="2"></div>
        <div class="grid-spot" data-index="3"></div>
        <div class="grid-spot" data-index="4"></div>
        <div class="grid-spot" data-index="5"></div>
        <div class="grid-spot" data-index="6"></div>
        <div class="grid-spot" data-index="7"></div>
        <div class="grid-spot" data-index="8"></div>
      </div>
      <button class="reset-button">Reset</button>
    </div>
  </body>
</html>
